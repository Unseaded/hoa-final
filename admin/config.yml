backend:
  name: github
  repo: your-username/hoa-final # UPDATE THIS TO YOUR REPO
  branch: main # Branch to update (master or main)

# Media files
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    file: "_data/settings.yml"
    fields:
      - {label: "Tagline", name: "tagline", widget: "string"}
      - {label: "Announcements (Markdown)", name: "announcements", widget: "markdown", required: false}
      - {label: "Footer Text", name: "footer_text", widget: "text"}
      - {label: "Management Company Info", name: "management_info", widget: "markdown", required: false}

  - name: "pages"
    label: "Pages"
    files:
      - file: "about.md"
        label: "About Page"
        name: "about"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
      - file: "board.md"
        label: "Board & Committees Page"
        name: "board"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
      - file: "contact.md"
        label: "Contact Page"
        name: "contact"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}
      - file: "resources.md"
        label: "Resources / FAQ Page"
        name: "resources"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Body", name: "body", widget: "markdown"}

  - name: "events"
    label: "Events"
    folder: "_events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false}
      - {label: "Time", name: "time", widget: "string", required: false}
      - {label: "Location", name: "location", widget: "string", required: false}
      - {label: "Image Flyer", name: "image", widget: "image", required: false}
      - {label: "Description", name: "body", widget: "markdown"}

  - name: "documents"
    label: "Documents"
    folder: "_documents"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false}
      - {label: "Category", name: "category", widget: "select", options: ["Meeting Minutes", "Bylaws & Covenants", "Financial Reports", "Newsletters", "Forms"]}
      - {label: "File", name: "file", widget: "file"}
      
  - name: "committee"
    label: "Board & Committee Members"
    folder: "_committee"
    create: true
    fields:
      - {label: "Name", name: "title", widget: "string"}
      - {label: "Role", name: "role", widget: "string"}
      - {label: "Group (e.g. Board, ARC)", name: "group", widget: "select", options: ["Board of Directors", "Architectural Review", "Landscaping", "Social"]}
      - {label: "Photo", name: "photo", widget: "image", required: false}
      - {label: "Sort Order", name: "sort_order", widget: "number", default: 10}
      - {label: "Bio", name: "body", widget: "markdown"}
