---
layout: default
---
<div class="page-container">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="subtitle">{{ page.subtitle }}</p>
    {% endif %}
    <div class="divider">
      <svg class="icon icon-split-rail" aria-hidden="true">
        <use href="#icon-split-rail"></use>
      </svg>
    </div>
  </header>
  <div class="page-content">
    {{ content }}
  </div>
</div>
