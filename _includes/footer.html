<footer class="site-footer">
  <div class="footer-container">
    <div class="footer-brand">
      <svg class="icon icon-horseshoe-large" aria-hidden="true">
        <use href="#icon-horseshoe"></use>
      </svg>
      <h2>{{ site.title }}</h2>
    </div>
    <div class="footer-info">
      <div class="footer-contact">
        <h3>Contact</h3>
        {{ site.data.settings.contact_info | markdownify }}
      </div>
      <div class="footer-management">
        <h3>Management</h3>
        {{ site.data.settings.management_info | markdownify }}
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
      <p><a href="{{ '/admin/' | relative_url }}">Admin Login</a></p>
    </div>
  </div>
</footer>
